<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0C0C0E">
<title>St. Olavsleden · Day Cards</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0C0E;--card:#161618;--border:#222226;--text:#F0EAD6;--muted:#9A9AA0;--accent:#C8A84B;--green:#27AE60;--red:#E74C3C;--blue:#3498DB}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,serif;overflow:hidden}
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px 0}
.tb-eyebrow{font-family:sans-serif;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.tb-main{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
#day-title{font-size:17px;font-style:italic;line-height:1.2}
.tb-nav{display:flex;gap:6px;flex-shrink:0}
.tb-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb-btn:disabled{opacity:.25;cursor:default}
.icon-btn{background:none;border:none;color:var(--accent);font-family:sans-serif;font-size:11px;cursor:pointer;padding:2px 6px}
#prog-track{height:8px;background:var(--border);border-radius:4px;margin-bottom:7px;position:relative}
#prog-fill{height:100%;border-radius:4px;transition:width .4s ease,background .4s ease}
.prog-tick{position:absolute;top:-2px;width:2px;height:12px;background:var(--bg);opacity:.6}
#pill-strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
#pill-strip::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:3px 10px;border-radius:11px;font-family:sans-serif;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.dpill.on{color:#000;border-color:transparent;font-weight:700}
#main{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding-top:118px;padding-bottom:72px}
.card-slide{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
#map-wrap{height:230px;position:relative}
#map{height:100%;width:100%}
#map-overlay{position:absolute;top:8px;right:8px;z-index:500;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.map-pill{background:rgba(12,12,14,.85);border:1px solid var(--border);color:var(--accent);font-family:sans-serif;font-size:10.5px;padding:4px 9px;border-radius:6px;text-decoration:none;white-space:nowrap;cursor:pointer}
.map-pill.est{color:var(--red);border-color:#E74C3C55}
.map-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
#card{padding:13px 14px}
.date-row{display:flex;align-items:center;gap:8px;font-family:sans-serif;font-size:11px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
#start-date,#start-time{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;font-family:sans-serif}
#trip-date{color:var(--accent)}
#eta-badge{color:var(--blue);margin-left:auto}
.stats{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.sc{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.sc:last-child{border-right:none}
.sv{font-size:16px;font-weight:700;color:var(--text)}
.sl{font-family:sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:2px}
#profile-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.profile-head{font-family:sans-serif;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
#elev-svg{width:100%;height:56px;display:block}
.sun{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:12px;gap:8px;font-family:sans-serif;font-size:12px}
.sun-t{white-space:nowrap}
.sun-bar{flex:1;height:4px;background:var(--border);border-radius:2px;position:relative}
.sun-fill{position:absolute;top:0;height:100%;background:linear-gradient(90deg,#FF8C42,#FFD166,#FF8C42);border-radius:2px;transition:width .4s}
#wx{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:12px;font-family:sans-serif}
.wx-head{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px}
.wx-row{display:flex;gap:12px;flex-wrap:wrap}
.wx-item{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text)}
.sec{font-family:sans-serif;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.stop{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.stop:last-child{border-bottom:none}
.stop.crit{background:linear-gradient(90deg,#E74C3C11,transparent);margin:0 -14px;padding:9px 14px;border-radius:6px}
.s-check{flex-shrink:0;padding-top:2px}
.s-check input{width:17px;height:17px;accent-color:var(--accent)}
.s-km{font-family:sans-serif;font-size:11px;font-weight:700;color:var(--accent);min-width:36px;padding-top:1px}
.s-ico{font-size:15px;padding-top:1px}
.s-body{flex:1}
.s-name{font-family:sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.s-note{font-family:sans-serif;font-size:11px;color:var(--muted);line-height:1.45}
.s-meta{font-family:sans-serif;font-size:10.5px;color:var(--accent);margin-top:4px}
.s-why{font-family:sans-serif;font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:4px}
.s-why b{color:var(--green)}
.s-backup{font-family:sans-serif;font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:3px}
.s-backup b{color:var(--red)}
.callout{border-radius:9px;padding:10px 12px;margin-bottom:12px;font-family:sans-serif;font-size:12px;color:var(--muted);line-height:1.5}
.callout b{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.c-green{background:var(--card);border:1px solid #27AE6033;border-left:3px solid var(--green)}
.c-green b{color:var(--green)}
.c-red{background:var(--card);border:1px solid #E74C3C33;border-left:3px solid var(--red)}
.c-red b{color:var(--red)}
.c-neutral{background:var(--card);border:1px solid var(--border)}
.c-neutral b{color:var(--muted)}
.c-blue{background:var(--card);border:1px solid #3498DB33;border-left:3px solid var(--blue)}
.c-blue b{color:var(--blue)}
#bot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 38%);padding:18px 14px 14px;display:flex;gap:8px;z-index:900}
.nb{flex:1;padding:12px;border-radius:11px;font-family:sans-serif;font-size:13px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s,color .15s}
.nb:disabled{opacity:.25;cursor:default}
.nb.pri{background:var(--accent);color:#000;border-color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px;width:100%;max-height:70vh;overflow-y:auto;font-family:sans-serif}
.modal h3{font-family:Georgia,serif;font-style:italic;font-size:18px;margin-bottom:12px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.emg-row{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.emg-row b{color:var(--accent);display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.leaflet-popup-content-wrapper{background:#1a1a1c;color:#F0EAD6;border:1px solid #2c2c2e;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5);padding:0}
.leaflet-popup-tip{background:#1a1a1c}
.leaflet-popup-content{margin:9px 12px;font-family:sans-serif;font-size:12px;line-height:1.5}
.leaflet-popup-close-button{color:#555!important;right:7px!important;top:5px!important}
.leaflet-control-attribution{font-size:9px!important}
</style>
</head>
<body>
<div id="topbar">
<div class="tb-eyebrow"><span>St. Olavsleden · Day Cards</span><button class="icon-btn" onclick="openEmergency()">🆘 Emergency</button></div>
<div class="tb-main">
<div id="day-title">Day 1: Selånger → Borgsjö</div>
<div class="tb-nav">
<button class="tb-btn" id="btn-p" onclick="go(-1)">‹</button>
<button class="tb-btn" id="btn-n" onclick="go(1)">›</button>
</div>
</div>
<div id="prog-track"><div id="prog-fill"></div></div>
<div id="pill-strip"></div>
</div>

<div id="main">

<div id="map-overlay">
<a href="index.html" class="map-pill">🗺 Overview</a>
<span class="map-pill" id="gps-toggle" onclick="toggleGPS()">📍 Track me</span>
<span class="map-pill" id="gpx-export" onclick="exportGPX()">⬇ Export GPX</span>
<span class="map-pill" id="map-km-label" style="color:var(--text)">—</span>
</div>
</div>

<div id="card">
<div class="date-row">
Start:&nbsp;<input type="date" id="start-date" onchange="onDateChange()">
<input type="time" id="start-time" value="06:00" onchange="onDateChange()">
<span id="trip-date"></span>
<span id="eta-badge"></span>
</div>

<div class="stats">
<div class="sc"><div class="sv" id="s-km">—</div><div class="sl">km</div></div>
<div class="sc"><div class="sv" id="s-eg">—</div><div class="sl">Climb</div></div>
<div class="sc"><div class="sv" id="s-t">—</div><div class="sl">Est. time</div></div>
<div class="sc"><div class="sv" id="s-d">—</div><div class="sl">Day</div></div>
<div class="sc"><div class="sv" id="s-c">—</div><div class="sl">Total</div></div>
</div>

<div id="profile-wrap">

<svg id="elev-svg" viewBox="0 0 300 56" preserveAspectRatio="none"></svg>
<div id="profile-note" style="font-family:sans-serif;font-size:9.5px;color:var(--muted);margin-top:4px"></div>
</div>

<div class="sun">
<div class="sun-t">🌅 <span id="sr">—</span></div>
<div class="sun-bar"><div class="sun-fill" id="sf"></div></div>
<div class="sun-t"><span id="ss">—</span> 🌇</div>
</div>

<div id="wx">
<div class="wx-head">Weather · <span id="wx-loc">—</span></div>
<div id="wx-body" class="wx-row"><span style="color:var(--muted);font-style:italic;font-size:12px">Set start date to see forecast</span></div>
</div>

<div class="sec"><span>Key stops</span><span style="font-size:9px">tap ✓ to check off</span></div>
<div id="stops"></div>

<div style="margin-top:12px" id="bivvy-c"></div>
<div id="warn-c"></div>
<div id="note-c"></div>
</div>
</div>

<div id="bot">
<button class="nb" id="nb-p" onclick="go(-1)">← Previous</button>
<button class="nb pri" id="nb-n" onclick="go(1)">Next →</button>
</div>

<div class="modal-bg" id="emg-modal" onclick="if(event.target===this)closeEmergency()">
<div class="modal">
<button class="modal-close" onclick="closeEmergency()">✕</button>

</div>
</div>

 only 9km before Fränsta, so it is your last realistic hot-food option before making camp -- worth timing your day so you pass through here hungry rather than already full.',backup:'If the Herrgård is closed, the riverside jetties are a reliable swim stop regardless, and Fränsta itself (9km on) has village services for a self-catered dinner.'},{km:71,n:'Fränsta',i:'🏕',note:'Services and water in the village. Camp here for the night. Sight: Vikbron bridge (1888), Sweden\'s longest wooden bridge at 133m.',t:'bivvy',why:'Chosen as the day-end specifically to keep Day 1 under a reasonable length -- the alternative (pushing to Borgsjö) would make this the single longest day of the entire trip. Fränsta has real village services and sits on the Ljungan river, so water is not a concern.',backup:'If Fränsta itself feels unsuitable for a wild camp when you arrive (e.g. no good pitch near the village), Torpshammar (9km back) or Borgsjö (18km on, has Borgsjö Strand campsite) are both solid fallbacks -- but Borgsjö would make for a very long day if you are already tired.'}],bivvy:'Fränsta village, services and water available. Chosen to cap Day 1\'s length; Borgsjö Strand campsite is a fully-serviced fallback 18km further if Fränsta doesn\'t work out on the day.',warn:null,note:'Shortened from the original 88.3km plan -- ends at Fränsta instead of Borgsjö so Day 1 is not the longest day of the whole trip. Trade-off: Day 2 absorbs the difference and becomes the new longest day (85.8km) since there is no official waypoint between Fränsta and Gällö to split further. Sight worth knowing: Vikbron bridge in Fränsta (1888) is Sweden longest wooden bridge at 133m, right near the end of today. Nothing skippable here -- all three intermediate stops (Matfors, Stöde, Torpshammar) are genuinely useful and roughly evenly spaced, so this is a day to use each one rather than push through.'},

4],[62.78104,15.38304],[62.7856,15.38264],[62.80517,15.35784],[62.80956,15.35612]],profile:[[0,0],[17.6,298],[38.0,1065],[58.7,1493],[70.8,1743]],stops:[{km:18,n:'Borgsjö Strand',i:'🍽',note:'CONFIRMED: restaurant + campsite on the Ljungan river. Lunch buffet Tue-Sun 11:00-16:00.',t:'food',hours:'Lunch buffet Tue-Sun 11:00-16:00, CLOSED MONDAYS',dwell:'30-45 min for the buffet, longer if swimming too',why:'The single best-confirmed meal stop of the whole trip -- real hours, a proper buffet, and a river swim in one place. Worth timing your morning start so you land here inside the 11-16 window.',backup:'If you land on a Monday or outside the window, the village of Borgsjö still has a tourist office, Naturum, and folk museum area with other options -- and the river is swimmable regardless of the restaurant\'s hours.'},{km:38,n:'Länsgränsen',i:'💧',note:'Stream at the county border.',t:'water',dwell:'5-10 min, water refill only',why:'A reliable refill point roughly two-thirds through the day, positioned so you are not relying on Bräcke alone for water.',backup:'If the stream looks low or questionable, push on to Hemsjön (12km further) which is a proper lake, or Bräcke (21km further) which has real services.'},{km:50,n:'Hemsjön',i:'🏊',note:'CONFIRMED real lake (Bräcke kommun) right on the route -- good swim/water refill option between stops.',t:'water',dwell:'10-20 min',why:'Sits almost exactly at the day\'s two-thirds mark and gives a real lake option between Länsgränsen and Bräcke, where the gap would otherwise be a long stretch without confirmed water.',backup:'None needed -- this is itself the backup for Länsgränsen, and Bräcke is only 9km further if you\'d rather push on.'},{km:59,n:'Bräcke',i:'🍽',note:'CONFIRMED lunch: Trattoria Italiana (Mon-Fri 11:00-14:00, weekends 12:00-20:00) or Bräcke Folkets Hus (Mon-Fri 11:00-13:30).',t:'food',hours:'Trattoria Italiana: Mon-Fri 11:00-14:00, Sat-Sun 12:00-20:00. Folkets Hus: Mon-Fri 11:00-13:30 only.',dwell:'20-30 min',why:'A real town with two independent, hours-confirmed food options -- useful precisely because it gives you a choice if one is shut when you arrive.',backup:'If both are closed (e.g. very late Sunday morning), Gimårasten (8km on) has a proper wind shelter and BBQ area where you can cook your own food.'},{km:67,n:'Gimårasten',i:'🍽',note:'CONFIRMED official rest stop with wind shelter, barbecue area and toilets.',t:'food',dwell:'15-20 min, longer if cooking a full meal here',why:'A genuinely useful failsafe if Bräcke\'s restaurant hours didn\'t line up -- shelter and a BBQ area mean you can always eat here regardless of anyone else\'s opening hours.',backup:'Not needed as a stop in its own right, but if you skip it, Stavre (4km on) is the day\'s end anyway.'},{km:71,n:'Stavre',i:'🏕',note:'Historic steamboat village with a train station -- real settlement, though specific camp/food amenities not individually verified yet.',t:'bivvy',why:'Chosen as the day-end because it is a real, historically-settled village (steamboat era, train station) roughly 71km in, keeping the day\'s pyramid shape intact even though it makes this the single longest day of the trip.',backup:'Amenities here are the least-verified of any camp night in the plan. If Stavre does not have an obvious pitch or water source when you arrive, backtrack to Gimårasten\'s wind shelter (4km) rather than pushing further tired, since the next confirmed water (Gällö/Camp Viking) is 15km on into Day 3.'}],bivvy:'Stavre village -- real settlement (old steamboat/train stop) but not individually verified for camp amenities. If it doesn\'t work out, Gimårasten\'s wind shelter (4km back) is a known-good fallback rather than pushing into Day 3 territory tired.',warn:'Longest day of the trip at 70.8 km, 1,743 m gain -- 0.1km over the previous day, essentially a plateau rather than a true increase.',note:'Extremely well-provisioned day: five confirmed food/water stops, more than any other day in the plan, which is exactly why it can afford to be the longest -- you\'re never far from a real break. If you\'re running short on time, Hemsjön and Gimårasten are the two most skippable (Länsgränsen/Bräcke and Bräcke/Stavre already cover the water and food needs respectively), but neither costs much of a detour since they\'re directly on the route.'},

profile:[[0,0],[15.0,311],[33.2,976],[55.7,1586],[63.5,1701]],stops:[{km:15,n:'Gällö / Camp Viking',i:'🍽',note:'CONFIRMED: campsite on Lake Revsundssjön, sandy beach, sauna, hot tub. Dinner Thu-Sun 18 June-16 Aug (self-catering other days). Small Viking-village exhibit on the headland.',t:'food',hours:'Dinner service Thu-Sun, 18 June-16 Aug only -- self-catering the rest of the week',dwell:'30-45 min, longer if using the sauna/hot tub',why:'Sits early in the day (15km in) rather than at the end, which is a deliberate choice -- it means you get to use this excellent lake+sauna spot even though it can\'t be the overnight stop given the day\'s length target.',backup:'If it\'s not a Thu-Sun, the beach and lake are still open for a swim regardless -- self-cater and treat it as a scenic break rather than a meal stop.'},{km:33,n:'Pilgrimstad',i:'📖',note:'Pilgrim stamp, small museum, and the original St Olav spring -- pilgrims once hung their walking sticks in the trees here after being cured.',t:'stamp',dwell:'10-15 min for the stamp and spring',why:'Historically significant and roughly at the day\'s midpoint, making it a natural halfway pause even without confirmed food.',backup:'No food confirmed here -- if you need a proper break, wait for Brunflo (23km on) or eat from your pack here.'},{km:56,n:'Brunflo',i:'📖',note:'30m defensive tower from the 1100s consecrated to St Olav. Stamp at Brunflo church.',t:'stamp',dwell:'10-15 min',why:'A real town positioned late enough in the day to work as a pre-camp check-in point, even though no specific restaurant is confirmed here yet.',backup:'If you need food and nothing here works, Ope (8km on, the day\'s end) sits on Lake Storsjön and you can self-cater there with confirmed water.'},{km:64,n:'Ope',i:'🏊',note:'CONFIRMED: village directly on the shore of Lake Storsjön (Sweden\'s 5th-largest lake) -- real waterfront, good camp+swim spot.',t:'bivvy',why:'Chosen specifically because it has CONFIRMED lake frontage right at the day-end -- real estate listings for the village mention private beach access, which is exactly the kind of guaranteed water access this plan is built around.',backup:'Storsjön is a large lake with a long shoreline, so if the exact spot you find isn\'t suitable for pitching, you have real flexibility to walk the shoreline a short distance in either direction rather than being stuck with one specific access point.'}],bivvy:'Ope, directly on Lake Storsjön -- confirmed shoreline access, and the lake is large enough that you have flexibility in exactly where you pitch along it.',warn:null,note:'63.5 km, 1,701 m gain. Camp Viking sits early in the day (km15) -- if it doesn\'t fit your schedule for dinner, it\'s still a good lunch/swim stop. End-of-day water at Ope is confirmed (Lake Storsjön shoreline). The two stamp stops (Pilgrimstad, Brunflo) are worth doing for the history but are skippable if you\'re behind schedule -- neither has confirmed food, so they don\'t cost you a meal option either way.'},

stersund',i:'🏙',note:'BEST RESUPPLY STOP on the whole route. Supermarket, outdoor shop, pharmacy, unlimited restaurants. Swim in Lake Storsjön. Sight: Storsjöodjuret lake-monster legend, Odensalakärret orchid reserve just before the city.',t:'city',hours:'Standard city hours -- supermarkets typically open until 21:00-22:00, more flexibility than anywhere else on the route',dwell:'1-2 hours minimum if properly resupplying; treat this as a deliberate stop, not a pass-through',why:'The only real city on the entire 590km route. This is your one chance to buy anything you forgot, restock properly, and eat a full restaurant meal with zero uncertainty about hours or availability.',backup:'None needed -- if for some reason the city itself is disrupted, this is a well-connected place with train/bus links to fall back on entirely different plans, which is not true of anywhere else on the route.'},{km:18,n:'Frösön',i:'🍽',note:'CONFIRMED: real stop past Östersund with hotel/spa and cafe. Frösö church (1200s, patron saint St Olav) and a rune stone nearby. Position refined using St Olavsloppet trail-race data (Frösö Park sits 10.1km from Östersund by measured trail distance).',t:'food',dwell:'15-20 min',why:'A second, calmer food option shortly after Östersund if you\'d rather eat here than in the city crowds -- also a genuine historic site (rune stone, 1200s church) worth a short stop regardless.',backup:'Not critical -- you\'ve just resupplied in Östersund, so treat this as optional unless you specifically want the cafe or the historic sights.'},{km:27,n:'Rödön',i:'💧',note:'River crossing, water available. Medieval church, Storsjö-monster viewing spot per legend.',t:'water',dwell:'5-10 min',why:'A reliable water refill roughly at the day\'s one-third mark, positioned between the Östersund resupply and the Nälden lunch stop.',backup:'You should already be well-stocked from Östersund, so this is a top-up rather than a critical fill -- if it looks unsuitable, Nälden (18km on) is confirmed for both food and water.'},{km:45,n:'Nälden',i:'🍽',note:'CONFIRMED lunch: Matverkstan Nälden serves lunch and has a cafe.',t:'food',hours:'Not individually confirmed -- check their Facebook page or call ahead if timing is tight',dwell:'20-30 min',why:'The day\'s confirmed hot-lunch option, positioned well past Östersund so you\'re not eating two big meals back to back, but early enough to fuel the final push to camp.',backup:'If closed, you\'re only 19km from Camp Östbacken (day\'s end) which has a shop for self-catering.'},{km:64,n:'Camp Östbacken, Alsen',i:'🛒',note:'CONFIRMED: village of Kluk, right on the trail. Shop (pharmacy/Systembolaget agent), confirmed swim spot. Self-catering dinner -- no restaurant confirmed.',t:'water',hours:'Shop hours not individually confirmed -- typical small-village hours, do not rely on it being open late',dwell:'Overnight',why:'Chosen for the day-end specifically because it has a confirmed shop AND a confirmed swim spot in one place -- rare combination for a wild-camp night, even though there\'s no restaurant.',backup:'If the shop is closed when you arrive, you should already have food from Nälden or Östersund -- this stop\'s value is the confirmed swim and water regardless of the shop\'s hours.'}],bivvy:'Camp Östbacken, Alsen (Kluk). Chosen for its confirmed shop + swim combination; if the shop is shut, you should already be carrying dinner from Nälden or Östersund earlier in the day.',warn:null,note:'64.0 km, 1,429 m gain. Östersund early in the day means a proper resupply before the mountains -- stock up here even though it\'s not the overnight stop. This is the one day where you genuinely can\'t skip the main stop (Östersund) -- everything else (Frösön, Rödön) is optional texture around it. Budget real time in Östersund; rushing through defeats the point of the day.'},

],[63.34746,13.20219],[63.35234,13.19776],[63.353,13.19396],[63.35169,13.18667],[63.36514,13.1635],[63.37352,13.15419],[63.37823,13.14654],[63.38516,13.12667],[63.38643,13.12724],[63.38694,13.11623],[63.39029,13.10333],[63.39195,13.09883],[63.39597,13.09396],[63.39796,13.0833],[63.39712,13.07964]],profile:[[0,0],[25.7,842],[44.7,1580],[67.6,3043]],stops:[{km:26,n:'Mörsil',i:'🍽',note:'Good midday lunch stop, hot meal before the mountains -- specific venue/hours not yet verified.',t:'food',hours:'Not verified -- treat as opportunistic rather than planned around',dwell:'20-30 min',why:'Positioned right before the day\'s serious climbing starts, so a hot meal here (if available) sets you up well for the push to Hålland and beyond.',backup:'If nothing is open, this is not a critical stop -- push on to Hålland for the critical water fill and eat from your pack.'},{km:45,n:'Hålland',i:'💧',note:'FILL ALL WATER HERE. No water on the stretch toward Åre.',t:'critical',dwell:'10-15 min, but do not rush the water fill itself',why:'This is the single most important stop of the day, full stop. The climb to Åre has no reliable water source, and it is also the steepest stretch you will face before the border crossing.',backup:'There is no backup for this one -- if you are unsure whether you have filled enough, fill more. Running short here has no fallback until Åre.'},{km:56,n:'Undersåker',i:'📖',note:'Village on the hills above the trail, views of Renfjället and Åreskutan mountain. Position refined using St Olavsloppet trail-race data (Undersåker sits 15.2km from Åre by measured trail distance).',t:'stamp',dwell:'10 min for the view, more if you want to linger',why:'Mostly a scenic waypoint confirming you\'re on track and close to Åre -- the view of Åreskutan is a genuine morale boost this late in a hard climbing day.',backup:'Entirely optional -- skip without consequence if you\'re racing daylight.'},{km:68,n:'Åre',i:'🏙',note:'Campsite with showers. Last supermarket and outdoor shop. Real restaurants for dinner. Swim in Lake Åresjön. Pack 2 days\' food for D6+D7. Sight: Åreskutan cable car.',t:'city',hours:'Resort town -- standard tourist-season hours, generally good availability into the evening',dwell:'Overnight, but budget real shopping time before stores close',why:'The last proper town before the border crossing. Everything you buy here needs to last through D6 AND D7 (until Vuku on the Norwegian side) -- this is not a stop to under-provision.',backup:'None -- there is nowhere else on the route with this level of resupply until well into Norway. If you arrive very late and shops are closed, you may need to adjust your D6 start time to shop first thing in the morning instead.'}],bivvy:'Åre campsite. Last facilities until Stiklestad. Showers here are genuinely worth using -- there isn\'t another reliable one for two more days.',warn:'Biggest single-day elevation gain of the whole route (3,043 m) -- fill up on food and water at Mörsil and Hålland. This day is 3.6km longer than the day before, the largest of the small remaining pacing bumps in this plan.',note:'The steepest day so far. Hålland is non-negotiable -- everything else on this day (Mörsil, Undersåker) is genuinely optional texture. Pack 2 days of food in Åre, not 1 -- D6 has confirmed food but D7\'s border crossing has almost none until Vuku, roughly 49km into that day.'},
{d:6,f:'Åre',t:'Skalstugan',c:'#FF7043',est:false,km:55.5,eg:1464,country:'SE',route:[[63.39712,13.07964],[63.39773,13.08061],[63.39708,13.07967],[63.4021,13.06911],[63.40358,13.04208],[63.40123,13.02759],[63.40009,12.99636],[63.39518,12.9727],[63.39245,12.91885],[63.39238,12.88315],[63.39473,12.86493],[63.39848,12.85073],[63.39994,12.82764],[63.402,12.82339],[63.40625,12.80276],[63.41073,12.79199],[63.41173,12.77922],[63.41496,12.7821],[63.41821,12.7802],[63.42073,12.78185],[63.42362,12.77606],[63.42847,12.77518],[63.43593,12.76242],[63.43612,12.75117],[63.44322,12.74031],[63.43803,12.72022],[63.43968,12.7015],[63.44678,12.68997],[63.44916,12.6814],[63.45033,12.67551],[63.44883,12.66443],[63.44996,12.65561],[63.46136,12.63441],[63.46751,12.61192],[63.47118,12.59143],[63.46978,12.57963],[63.47248,12.57118],[63.47162,12.56478],[63.47263,12.56148],[63.47495,12.56027],[63.47802,12.5495],[63.47894,12.53791],[63.48442,12.51208],[63.48431,12.50448],[63.49029,12.47959],[63.49617,12.47126],[63.50909,12.46235],[63.51205,12.45595],[63.51426,12.44737],[63.51296,12.42616],[63.5158,12.41341],[63.53495,12.38545],[63.54617,12.37873],[63.5523,12.37053],[63.55494,12.37104],[63.55865,12.36929],[63.56164,12.36465],[63.56199,12.35562],[63.55958,12.35106],[63.55804,12.35147],[63.55847,12.33974],[63.55618,12.32184],[63.56111,12.29371],[63.56408,12.28802],[63.56849,12.28623],[63.57119,12.27899],[63.57499,12.27554]],profile:[[0,0],[21.7,497],[44.9,967],[55.5,1464]],stops:[{km:12,n:'Duved',i:'📖',note:'Duved church resembles a wooden Gothic cathedral -- worth a look early in the day.',t:'stamp',dwell:'10 min',why:'A quick, low-cost historic stop early in the day when you\'re fresh.',backup:'Skip freely if you want to conserve time for the bigger stops later (Tännforsen especially).'},{km:22,n:'Tännforsen',i:'🏊',note:'Scandinavia\'s most powerful waterfall (38m). Cafe on site. Traditional pilgrim swimming spot -- ice cold and mandatory!',t:'swim',hours:'Cafe hours not individually confirmed -- likely standard tourist-season daytime hours',dwell:'30-45 min -- this is worth lingering at',why:'The single best sight on the whole route by most accounts, and a genuine pilgrim tradition. Worth planning your day so you arrive here with energy to actually enjoy it, not just pass through.',backup:'The waterfall and swim spot don\'t depend on the cafe being open -- this stop works regardless of hours.'},{km:34,n:'Bodsjön',i:'🏊',note:'Real lake along the route -- good water refill/swim option.',t:'water',dwell:'10-15 min',why:'A confirmed lake positioned between Tännforsen and Medstugan, giving you a second swim/water option if you didn\'t linger at the waterfall.',backup:'Medstugusjön (6km on) is essentially the same kind of stop if you\'d rather push on.'},{km:40,n:'Medstugusjön',i:'🏊',note:'Real lake near Medstugan -- another swim/water option right before the hostel.',t:'water',dwell:'10-15 min',why:'The last confirmed lake before Skalstugan, positioned right before Medstugan itself, so it\'s a good spot to fill water even if you don\'t plan to swim at Medstugan.',backup:'Medstugeån river at Medstugan itself (5km on) covers the same need.'},{km:45,n:'Medstugan',i:'💧',note:'Medstugans Vandrarhem is self-catering only -- no restaurant confirmed. River (Medstugeån) runs right past it for a swim. Closed 15 Aug-20 Oct if hiking late season.',t:'swim',hours:'Vandrarhem closed 15 Aug-20 Oct -- confirm this doesn\'t affect your dates',dwell:'15-20 min for water/swim, longer if using the hostel facilities (if open)',why:'Confirmed river water this late in the day means you don\'t need to carry extra all the way to Skalstugan, even though there\'s no hot food here.',backup:'If the hostel is closed for the season, the river itself is unaffected and still usable for water and a swim.'},{km:56,n:'Skalstugan',i:'🏕',note:'Last point in Sweden. Fill up on water (2L+). Border crossing tomorrow.',t:'bivvy',why:'Chosen as the last Swedish night specifically because it sits right at the start of the border-crossing corridor -- camping here means D7 starts fresh rather than adding distance onto an already-hard day.',backup:'This is the last reliably-serviced point before a genuinely remote stretch -- if anything about your gear or supplies feels short, this is the place to sort it out, not partway through D7.'}],bivvy:'Skalstugan mountain lodge area. Last reliably-serviced point before the border crossing -- treat this as your final check: water topped up to 2L+, food sorted for tomorrow\'s hardest day, gear checked.',warn:null,note:'Elevation gain for Tännforsen-Medstugan is missing from official data, estimated ~470m. Pack dinner -- Medstugan does not have a confirmed restaurant, but two lakes (Bodsjön, Medstugusjön) plus the river give plenty of water/swim options along the way. Tännforsen is the one stop on this day you should not rush past -- everything else here is genuinely optional. Save energy -- tomorrow is the hardest day on the route by a clear margin.'},
{d:7,f:'Skalstugan',t:'Stiklestad',c:'#F44336',est:true,km:60.4,eg:3072,country:'NO',route:[[63.57499,12.27554],[63.61106,12.25549],[63.6433,12.23402],[63.66849,12.20991],[63.68445,12.18236],[63.69042,12.15109],[63.68717,12.11638],[63.67686,12.07904],[63.66272,12.04027],[63.70912,12.01443],[63.7506,11.98676],[63.783,11.95571],[63.80354,11.92023],[63.81124,11.87997],[63.80708,11.83528],[63.79385,11.7872],[63.7757,11.7373],[63.79646,11.71006],[63.81256,11.68229],[63.82059,11.65358],[63.81931,11.6238],[63.80996,11.59309],[63.79595,11.56184]],profile:[[0,0],[21.2,947],[48.5,2728],[60.4,3072]],stops:[{km:21,n:'Sul',i:'💧',note:'Norwegian border crossing behind you. Fill up on all water (2L+) -- no services for ~27km. No confirmed food here.',t:'critical',dwell:'15-20 min, do not rush the water fill',why:'This is the last water before a genuinely long, remote stretch (~27km to Vuku). Treat this stop with the same seriousness as Hålland on D5 -- there is no margin for under-filling here.',backup:'None -- if you\'re unsure, fill more than you think you need. The next confirmed water is Vuku, and that is hours away.'},{km:49,n:'Vuku',i:'🛒',note:'CONFIRMED: Vuku Gatekjøkken (the \'Vukuburger\') plus Coop Prix Vuku -- Mon-Fri 08:00-21:00, Sat 08:00-20:00, CLOSED SUNDAY. Biggest elevation gain of the route (1,781m) on this stretch.',t:'food',hours:'Coop Prix: Mon-Fri 08:00-21:00, Sat 08:00-20:00, CLOSED SUNDAY. Gatekjøkken hours less certain but likely open more days.',dwell:'20-30 min, longer if you need a proper resupply here',why:'The first real services after crossing into Norway, and critically important if this is your first resupply chance after the border corridor -- but the Sunday closure genuinely matters for planning.',backup:'If you land here on a Sunday, the grill may still be open even if the Coop is not -- but do not count on either. If both are shut, Stiklestad (11km on) has more options, including the camping site facilities.'},{km:60,n:'Stiklestad',i:'📖',note:'King Olav II fell here in 1030. Pilgrim stamp, museum, cultural centre. CONFIRMED water: Verdalselva river runs right past the area (Stiklestad Camping sits directly on it, 2km from the monument).',t:'stamp',dwell:'Overnight, plus time for the museum/monument if you have energy left',why:'The historic and symbolic heart of the whole pilgrimage -- this is genuinely worth pausing for if you arrive with any energy left, not just passing through to camp.',backup:'Not applicable -- this is the fixed day-end.'}],bivvy:'Near the Stiklestad monument, close to the Verdalselva river (confirmed water via Stiklestad Camping, 2km away). After the hardest day on the route, prioritize finding water and rest over visiting the museum tonight -- save that for a clearer head if you\'re passing through again, or do it in the morning before D8.',warn:'HARDEST AND LONGEST STAGE (60.4 km, 3,072 m gain -- official figures, cross-checked against St Olavsloppet trail-race data which measures the same corridor at 57.4km, a 5% gap consistent with road-race vs hiking-trail routing). The map line is still an approximation -- no official GPX exists for this stretch. Follow physical waymarking, especially through the border. Pre-dawn start (04:00-04:30) recommended. No services between Sul and Vuku (~27 km).',note:'Distance/elevation are from stolavsleden.com\'s official stage table, not GPS tracking. The critical decision points today are Sul (fill everything) and Vuku (resupply, but watch the Sunday closure). Consider splitting this into two days with an overnight near Sul if the full 60.4km with 3,072m of climbing feels too ambitious in one push -- there is no shame in breaking up the hardest day on the route.'},

hich this whole plan follows, rather than the outer coastal alternative) specifically routes overnight stops through here.',backup:'Since you are wild camping rather than relying on the hostel booking, if Borås itself doesn\'t offer a good pitch, the river-adjacent ground nearby (per the official trail description) should still work -- this is one of the less-verified camp nights, so have a slightly more open mind about the exact spot.'}],bivvy:'Borås -- river-adjacent per the official trail text, though this is one of the less individually-verified camp nights in the plan. As a self-catering pilgrim hostel exists here, if wild camping doesn\'t pan out on arrival, that\'s a known fallback (requires pre-booking, so decide before you\'re on approach).',warn:null,note:'61.1 km, 2,013 m gain -- 0.7km over the border day, essentially a plateau continuing from D7\'s intensity. Munkeby Herberge is worth prioritizing over Markabygda if you have to choose -- it\'s the more distinctive and better-confirmed stop of the two. Your body will still feel yesterday\'s border crossing; keep the pace easy.'},

function haversine(a,b){
const R=6371.0,D2R=Math.PI/180;
const dLat=(b[0]-a[0])*D2R,dLon=(b[1]-a[1])*D2R;
const la1=a[0]*D2R,la2=b[0]*D2R;
const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
return 2*R*Math.asin(Math.sqrt(h));
}
function routeMid(route){ return route[Math.floor(route.length/2)]; }

D.forEach(d=>CUM.push(CUM[CUM.length-1]+d.km));

// ═══════════════════════════════════
// ELEVATION PROFILE
// Two layers: (1) immediately draw the cumulative-GAIN chart from official
// data as a fast fallback -- note this ALWAYS trends upward by definition,
// since "gain" only counts climbing, not descent, so it is not a real
// up/down contour. (2) Attempt to fetch REAL terrain elevation along the
// route and redraw as an actual up/down profile if it succeeds. Cached in
// localStorage per day so repeat visits don't re-fetch.
// ═══════════════════════════════════
const ELEV_CACHE_KEY='olavsleden_elev_cache_v1';
let elevCache={};
try{ elevCache = JSON.parse(localStorage.getItem(ELEV_CACHE_KEY)||'{}'); }catch(e){ elevCache={}; }

function drawProfile(d){
drawGainProfile(d); // fast, always works, cumulative gain only (see note above)
document.getElementById('profile-note').textContent = 'Showing cumulative climb (official data) -- fetching real terrain profile…';
loadRealProfile(d);
}

function drawGainProfile(d){
const svg=document.getElementById('elev-svg');
const W=300,H=56,pad=2;
const maxKm=d.profile[d.profile.length-1][0];
const maxEg=Math.max(...d.profile.map(p=>p[1]),1);
document.getElementById('profile-max').textContent=`peak +${maxEg}m`;
let path=`M0,${H-pad}`;
d.profile.forEach(([km,eg])=>{
const x=(km/maxKm)*W;
const y=H-pad-(eg/maxEg)*(H-2*pad);
path+=` L${x.toFixed(1)},${y.toFixed(1)}`;
});
path+=` L${W},${H-pad} Z`;
svg.innerHTML=`<path d="${path}" fill="${d.c}33" stroke="${d.c}" stroke-width="2" stroke-linejoin="round"/>`;
}

async function loadRealProfile(d){
const cacheKey = `d${d.d}_${d.route.length}`;
if(elevCache[cacheKey]){ renderRealProfile(d, elevCache[cacheKey]); return; }
try{
// sample ~20 evenly spaced points along the route
const n=20;
const pts=[];
for(let i=0;i<=n;i++){
const t=i/n*(d.route.length-1);
const idx=Math.floor(t);
pts.push(d.route[Math.min(idx,d.route.length-1)]);
}
const locations = pts.map(([lat,lon])=>({latitude:lat,longitude:lon}));
const r = await fetch('https://api.open-elevation.com/api/v1/lookup', {
method:'POST', headers:{'Content-Type':'application/json'},
body: JSON.stringify({locations})
});
if(!r.ok) throw new Error('elevation API error');
const data = await r.json();
const elevations = data.results.map(x=>x.elevation);
elevCache[cacheKey]=elevations;
try{ localStorage.setItem(ELEV_CACHE_KEY, JSON.stringify(elevCache)); }catch(e){}
renderRealProfile(d, elevations);
}catch(e){
document.getElementById('profile-note').textContent = 'Real terrain data unavailable right now -- showing cumulative climb only (always trends up, not a true contour).';
}
}

function renderRealProfile(d, elevations){
if(cur !== D.indexOf(d)) return; // user already moved to another day
const svg=document.getElementById('elev-svg');
const W=300,H=56,pad=2;
const minE=Math.min(...elevations), maxE=Math.max(...elevations);
const range=Math.max(maxE-minE,1);
const n=elevations.length-1;
let path=`M0,${(H-pad-((elevations[0]-minE)/range)*(H-2*pad)).toFixed(1)}`;
elevations.forEach((e,i)=>{
const x=(i/n)*W;
const y=H-pad-((e-minE)/range)*(H-2*pad);
path+=` L${x.toFixed(1)},${y.toFixed(1)}`;
});
path+=` L${W},${H-pad} L0,${H-pad} Z`;
svg.innerHTML=`<path d="${path}" fill="${d.c}33" stroke="${d.c}" stroke-width="2" stroke-linejoin="round"/>`;
document.getElementById('profile-max').textContent=`${Math.round(minE)}-${Math.round(maxE)}m alt.`;
document.getElementById('profile-note').textContent = 'Real terrain profile (sampled along route) -- shape shows actual ups and downs, not just cumulative climb.';
}

// ═══════════════════════════════════
// MAP
// ═══════════════════════════════════
function updateMap(d){
if(routeLine) map.removeLayer(routeLine);
mkrs.forEach(m=>map.removeLayer(m));mkrs=[];
routeLine=L.polyline(d.route,{color:d.c,weight:5.5,opacity:.92,dashArray:d.est?'8,6':null}).addTo(map);

addDot(d.route[0],'#fff',d.f);
addDot(d.route[d.route.length-1],d.c,d.t);

d.stops.filter(s=>s.t!=='bivvy').forEach(s=>{
const pos=lerp(d.route,s.km/d.km);
const isCrit=s.t==='critical';
const ico=L.divIcon({html:isCrit
?`<div style="width:14px;height:14px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 0 8px #E74C3C"></div>`
:`<div style="font-size:16px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.8))">${s.i}</div>`,
className:'',iconSize:[20,20],iconAnchor:[10,10]});
const m=L.marker(pos,{icon:ico})
.bindPopup(`<b>${s.n}</b><br><small>${s.km}km · ${s.note}</small>`)
.addTo(map);
mkrs.push(m);
});

map.fitBounds(routeLine.getBounds(),{padding:[24,24]});
}
function addDot(pos,color,label){
const ico=L.divIcon({
html:`<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid rgba(0,0,0,.5);box-shadow:0 0 6px ${color}"></div>`,
className:'',iconSize:[10,10],iconAnchor:[5,5]});
const m=L.marker(pos,{icon:ico}).bindPopup(label).addTo(map);
mkrs.push(m);
}
function lerp(route,f){
const n=route.length,idx=Math.min(Math.floor(f*(n-1)),n-2);
const t=f*(n-1)-idx,a=route[idx],b=route[idx+1];
return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
}

function toggleGPS(){
const btn=document.getElementById('gps-toggle');

navigator.geolocation.clearWatch(gpsWatchId);
gpsWatchId=null;

if(!navigator.geolocation){ alert('Geolocation not supported on this device.'); return; }
btn.classList.add('on');
btn.textContent='📍 Tracking…';
gpsWatchId=navigator.geolocation.watchPosition(pos=>{
const ll=[pos.coords.latitude,pos.coords.longitude];
if(!gpsMarker){
const ico=L.divIcon({html:`<div style="width:14px;height:14px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 0 10px var(--blue)"></div>`,className:'',iconSize:[14,14],iconAnchor:[7,7]});
gpsMarker=L.marker(ll,{icon:ico,zIndexOffset:1000}).addTo(map);
}else{
gpsMarker.setLatLng(ll);
}
},err=>{
alert('Could not get location: '+err.message);
btn.classList.remove('on');
btn.textContent='📍 Track me';
gpsWatchId=null;
},{enableHighAccuracy:true,maximumAge:10000});
}

// GPX EXPORT
// ═══════════════════════════════════
function exportGPX(){
const d=D[cur];
const pts=d.route.map(([lat,lon])=>`<trkpt lat="${lat}" lon="${lon}"></trkpt>`).join('\n');
const gpx=`<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="St. Olavsleden Day Cards" xmlns="http://www.topografix.com/GPX/1/1">
<trk><name>Day ${d.d}: ${d.f} to ${d.t}</name><trkseg>
${pts}
</trkseg></trk>
</gpx>`;
const blob=new Blob([gpx],{type:'application/gpx+xml'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url; a.download=`day${d.d}-${d.f}-${d.t}.gpx`.replace(/[^\w.-]+/g,'_');
document.body.appendChild(a); a.click(); document.body.removeChild(a);
URL.revokeObjectURL(url);
}

// ═══════════════════════════════════
// DATE / SUN / PACE (Naismith's rule)
// ═══════════════════════════════════
function onDateChange(){
const v=document.getElementById('start-date').value;
if(!v)return;
startDate=new Date(v+'T12:00:00');
const d=D[cur];
const date=new Date(startDate);date.setDate(date.getDate()+cur);
document.getElementById('trip-date').textContent=
date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

// Naismith: 1hr per 4km flat + 1hr per 600m ascent -- this is MOVING time only,
// it does not include breaks, lunch stops, or photo stops. Add roughly
// 10-15 min per key stop you plan to actually pause at.
const movingHrs = d.km/4 + d.eg/600;
document.getElementById('s-t').textContent=`~${movingHrs.toFixed(1)}h`;

const timeVal=document.getElementById('start-time').value||'06:00';
const [hh,mm]=timeVal.split(':').map(Number);
const finish=new Date(date); finish.setHours(hh,mm,0,0);
// ETA assumes ~15min per stop as a rough buffer on top of moving time
const stopBufferHrs = (d.stops.length * 15)/60;
finish.setTime(finish.getTime()+(movingHrs+stopBufferHrs)*3600*1000);
document.getElementById('eta-badge').textContent=`ETA ~${finish.toTimeString().slice(0,5)} (incl. stops)`;

const {sr,ss,hrsDay}=sunTimes(d.mid[0],d.mid[1],date);
document.getElementById('sr').textContent=sr;
document.getElementById('ss').textContent=ss;
document.getElementById('sf').style.width=(hrsDay/24*100).toFixed(0)+'%';
fetchWx(d,date);
}

// Sweden and Norway both use CET/CEST on the same schedule (EU rule: DST from
// last Sunday in March to last Sunday in October). Since this trip runs
// Aug-Sep, it's always CEST (UTC+2) -- but the check below handles it properly
// in case the plan ever shifts into DST-transition dates.
function isDST_EU(date){
const y = date.getFullYear();
const marLast = new Date(Date.UTC(y,2,31)); marLast.setUTCDate(31-marLast.getUTCDay());
const octLast = new Date(Date.UTC(y,9,31)); octLast.setUTCDate(31-octLast.getUTCDay());
return date >= marLast && date < octLast;
}

// Proper NOAA-style solar position calculation (accurate to ~1 minute),
// with correct local timezone offset -- the previous simplified formula
// was off by up to 3+ hours in testing and has been replaced.
function sunTimes(lat,lon,date){
const D2R=Math.PI/180;
const tzOffset = isDST_EU(date) ? 2 : 1; // CEST or CET
const start = new Date(Date.UTC(date.getFullYear(),0,0));
const doy = Math.floor((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()) - start) / 864e5);
const gamma = 2*Math.PI/365 * (doy-1);
const eqtime = 229.18*(0.000075+0.001868*Math.cos(gamma)-0.032077*Math.sin(gamma)
  -0.014615*Math.cos(2*gamma)-0.040849*Math.sin(2*gamma));
const decl = 0.006918-0.399912*Math.cos(gamma)+0.070257*Math.sin(gamma)
  -0.006758*Math.cos(2*gamma)+0.000907*Math.sin(2*gamma)
  -0.002697*Math.cos(3*gamma)+0.00148*Math.sin(3*gamma);
const zenith = 90.833*D2R;
const cosHA = (Math.cos(zenith)/(Math.cos(lat*D2R)*Math.cos(decl))) - Math.tan(lat*D2R)*Math.tan(decl);
const fmt=m=>{m=((m%1440)+1440)%1440;const H=Math.floor(m/60),M=Math.round(m%60);return`${String(H).padStart(2,'0')}:${String(M<60?M:0).padStart(2,'0')}`};
if(cosHA>1) return{sr:'Polar night',ss:'—',hrsDay:0};
if(cosHA<-1) return{sr:'00:00',ss:'24:00',hrsDay:24};
const ha = Math.acos(cosHA)/D2R;
const sunriseMin = 720 - 4*(lon+ha) - eqtime + tzOffset*60;
const sunsetMin = 720 - 4*(lon-ha) - eqtime + tzOffset*60;
return{sr:fmt(sunriseMin), ss:fmt(sunsetMin), hrsDay:(ha*2)/15};
}

// ═══════════════════════════════════
// WEATHER (met.no)
// ═══════════════════════════════════
async function fetchWx(d,date){
const el=document.getElementById('wx-body');
const loc=document.getElementById('wx-loc');
loc.textContent=`${d.mid[0].toFixed(1)}°N, D${d.d}`;
const diff=(date-new Date())/864e5;
if(diff>9||diff<-1){
el.innerHTML=`<span style="color:var(--muted);font-style:italic;font-size:12px">Forecast available within 9 days</span>`;
return;
}
const key=`${d.mid[0].toFixed(1)}_${d.mid[1].toFixed(1)}`;
if(wxCache[key]){renderWx(wxCache[key],date,el);return;}
el.innerHTML=`<span style="color:var(--muted);font-size:12px">Fetching weather…</span>`;
try{
const r=await fetch(`https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${d.mid[0].toFixed(2)}&lon=${d.mid[1].toFixed(2)}`);
const data=await r.json();wxCache[key]=data;renderWx(data,date,el);
}catch(e){
el.innerHTML=`<a href="https://www.yr.no" target="_blank" style="color:var(--accent);font-family:sans-serif;font-size:12px">Check yr.no →</a>`;
}
}
function renderWx(data,date,el){
try{
const target=date.toISOString().slice(0,10)+'T06:00:00Z';
const ts=data.properties.timeseries;
const entry=ts.find(t=>t.time>=target)||ts[0];
const ins=entry.data.instant.details;
const n6=entry.data.next_6_hours;
const sym=n6?.summary?.symbol_code||'';
const ico=sym.includes('clearsky')?'☀️':sym.includes('fair')?'🌤':sym.includes('partly')?'⛅':
sym.includes('cloudy')?'☁️':sym.includes('rain')?'🌧':sym.includes('snow')?'❄️':'🌤';
el.innerHTML=`
<div class="wx-item">${ico} <b>${Math.round(ins.air_temperature)}°C</b></div>
<div class="wx-item">💨 ${Math.round(ins.wind_speed)}m/s</div>
<div class="wx-item">🌧 ${(n6?.details?.precipitation_amount??0).toFixed(1)}mm</div>
<div class="wx-item">💦 ${Math.round(ins.relative_humidity)}%</div>`;
}catch(e){
el.innerHTML=`<a href="https://www.yr.no" target="_blank" style="color:var(--accent);font-family:sans-serif;font-size:12px">Check yr.no →</a>`;
}
}

}
